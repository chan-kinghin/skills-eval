# SkillEval Default Model Catalog
# Pricing is approximate (per million tokens, USD). Update as providers change rates.
# Models are accessed via OpenAI-compatible chat completion API.
# Last updated: February 2026

# =============================================================================
# QWEN (Alibaba Cloud / DashScope)
# Signup: https://dashscope.console.aliyun.com/
# Env var: DASHSCOPE_API_KEY
# =============================================================================

# Frontier — Alibaba's flagship, best quality for complex document tasks
- name: qwen-max
  provider: dashscope
  endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
  input_cost_per_m: 1.60
  output_cost_per_m: 6.40
  env_key: DASHSCOPE_API_KEY
  context_window: 131072

# Mid — Strong balance of quality and cost, handles most document tasks well
- name: qwen-plus
  provider: dashscope
  endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
  input_cost_per_m: 0.40
  output_cost_per_m: 1.20
  env_key: DASHSCOPE_API_KEY
  context_window: 131072

# Budget — Fast and cheap, good for simple extraction tasks
- name: qwen-turbo
  provider: dashscope
  endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1
  input_cost_per_m: 0.05
  output_cost_per_m: 0.20
  env_key: DASHSCOPE_API_KEY
  context_window: 131072

